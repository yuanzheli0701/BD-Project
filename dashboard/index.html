<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Mood x Weather ? CDI Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
h1 { font-size: 1.4rem; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header { padding: 18px 28px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.header select { background: #1e293b; color: #e2e8f0; border: 1px solid #475569; border-radius: 8px; padding: 8px 14px; font-size: 0.9rem; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; padding: 18px 28px; }
@media(max-width:768px){.stats{grid-template-columns: repeat(2,1fr)} }
.stat { background: #1e293b; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #334155; }
.stat .val { font-size: 1.7rem; font-weight: 700; }
.stat .lbl { font-size: 0.7rem; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 28px 18px; }
@media(max-width:1024px){.grid{grid-template-columns:1fr} }
.panel { background: #1e293b; border-radius: 14px; border: 1px solid #334155; overflow: hidden; }
.panel h3 { padding: 14px 18px; font-size: 0.78rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #334155; }
#map { height: 440px; }
.scroll { max-height: 440px; overflow-y: auto; padding: 10px; }
.scroll::-webkit-scrollbar { width: 5px; }
.scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
.card { background: #0f172a; border-radius: 10px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #1e293b; }
.card .rank { font-size: 1.2rem; font-weight: 800; color: #475569; min-width: 28px; }
.card .rank.gold { color: #f59e0b; }
.card .info { flex:1; }
.card .name { font-weight: 600; font-size: 0.9rem; }
.card .meta { font-size: 0.7rem; color: #64748b; }
.card .weather { font-size: 0.72rem; color: #94a3b8; margin-top: 2px; }
.badge { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; text-align: center; line-height: 1.3; }
.badge.g { background: #064e3b30; color: #34d399; border: 1px solid #065f46; }
.badge.y { background: #78350f30; color: #fbbf24; border: 1px solid #92400e; }
.badge.o { background: #7f1d1d30; color: #f87171; border: 1px solid #991b1b; }
.badge.r { background: #4c1d9530; color: #c084fc; border: 1px solid #6d28d9; }
.bars { padding: 14px; }
.bar { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.bar .lbl { font-size: 0.72rem; color: #94a3b8; width: 75px; text-align: right; flex-shrink: 0; }
.bar .track { flex:1; height: 20px; background: #0f172a; border-radius: 5px; overflow: hidden; }
.bar .fill { height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 7px; font-size: 0.65rem; font-weight: 600; transition: width 0.4s; }
.footer { text-align: center; padding: 14px; color: #334155; font-size: 0.65rem; border-top: 1px solid #1e293b; }
</style>
</head>
<body>
<div class="header">
  <div><h1>City Mood x Weather</h1><div style="font-size:0.7rem;color:#64748b;margin-top:2px;">CDI = (1 - avg_valence) x (1 + rain + cloud + humidity bonus)</div></div>
  <select id="datePick"></select>
</div>
<div class="stats" id="stats"></div>
<div class="grid">
  <div class="panel"><h3>Global CDI Map</h3><div id="map"></div></div>
  <div class="panel"><h3>City Rankings</h3><div class="scroll" id="cards"></div></div>
</div>
<div class="grid">
  <div class="panel"><h3>CDI by City</h3><div class="bars" id="cdiBars"></div></div>
  <div class="panel"><h3>Avg Valence by City</h3><div class="bars" id="valBars"></div></div>
</div>
<div class="footer">Mock data demonstration | 60 records across 6 days</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

var dates = [...new Set(DATA.map(function(d){return d.date}))].sort();
var sel = document.getElementById('datePick');
dates.forEach(function(d){
  var o = document.createElement('option');
  o.value = d; o.textContent = d;
  if(d === dates[dates.length-1]) o.selected = true;
  sel.appendChild(o);
});

var map = null;
try {
  map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {attribution:'CartoDB',maxZoom:18}).addTo(map);
} catch(e) { document.getElementById('map').innerHTML = '<div style="padding:40px;text-align:center;color:#64748b;">Map unavailable (CDN blocked)<br><small>'+e.message+'</small></div>'; }

var markers = [];

function cdiColor(v) {
  if(v<0.3) return '#34d399';
  if(v<0.5) return '#a3e635';
  if(v<0.65) return '#fbbf24';
  if(v<0.85) return '#f97316';
  return '#ef4444';
}
function cdiClass(v) {
  if(v<0.3) return 'g';
  if(v<0.6) return 'y';
  if(v<0.9) return 'o';
  return 'r';
}

function render(date) {
  var rows = DATA.filter(function(d){return d.date===date}).sort(function(a,b){return b.depression_index - a.depression_index});

  var avgC = (rows.reduce(function(s,d){return s+d.depression_index},0)/rows.length).toFixed(4);
  var avgV = (rows.reduce(function(s,d){return s+d.avg_valence},0)/rows.length).toFixed(4);
  var rainy = rows.filter(function(d){return d.is_rainy}).length;
  var top = rows[0];

  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="val" style="color:#f87171">'+avgC+'</div><div class="lbl">Average CDI</div></div>'+
    '<div class="stat"><div class="val" style="color:#60a5fa">'+avgV+'</div><div class="lbl">Avg Valence</div></div>'+
    '<div class="stat"><div class="val" style="color:#a78bfa">'+rainy+'/'+rows.length+'</div><div class="lbl">Rainy Cities</div></div>'+
    '<div class="stat"><div class="val" style="color:#fbbf24">'+top.city+'</div><div class="lbl">Highest CDI</div></div>';

  if(map) {
    markers.forEach(function(m){map.removeLayer(m)});
    markers = [];
    rows.forEach(function(d){
      var color = cdiColor(d.depression_index);
      var m = L.circleMarker([d.lat,d.lon],{
        radius: 10 + d.depression_index * 14,
        fillColor: color, color: '#fff', weight: 1.5, fillOpacity: 0.85
      }).addTo(map);
      m.bindPopup('<b>'+d.city+'</b><br>CDI: '+d.depression_index.toFixed(4)+'<br>Valence: '+d.avg_valence.toFixed(4)+'<br>'+(d.is_rainy?'Rainy':'Sunny')+' | '+d.clouds_avg+'% clouds<br><span style="color:'+color+'">'+d.mood_category+'</span>');
      markers.push(m);
    });
  }

  document.getElementById('cards').innerHTML = rows.map(function(d,i){
    return '<div class="card"><div class="rank'+(i===0?' gold':'')+'">#'+(i+1)+'</div><div class="info"><div class="name">'+d.city+'</div><div class="meta">'+d.country+' | '+d.region.toUpperCase()+'</div><div class="weather">'+(d.is_rainy?'Rainy':'Sunny')+' | '+d.temp_avg.toFixed(1)+' C | '+d.clouds_avg+'% clouds | '+d.humidity_avg+'% humidity</div></div><div class="badge '+cdiClass(d.depression_index)+'">CDI '+d.depression_index.toFixed(4)+'<br>'+d.mood_category+'</div></div>';
  }).join('');

  document.getElementById('cdiBars').innerHTML = rows.map(function(d){
    var w = Math.max(4, (d.depression_index/1.2)*100);
    return '<div class="bar"><div class="lbl">'+d.city+'</div><div class="track"><div class="fill" style="width:'+w+'%;background:'+cdiColor(d.depression_index)+'">'+d.depression_index.toFixed(3)+'</div></div></div>';
  }).join('');

  var byVal = rows.slice().sort(function(a,b){return a.avg_valence - b.avg_valence});
  document.getElementById('valBars').innerHTML = byVal.map(function(d){
    var w = Math.max(4, d.avg_valence*100);
    return '<div class="bar"><div class="lbl">'+d.city+'</div><div class="track"><div class="fill" style="width:'+w+'%;background:#60a5fa">'+d.avg_valence.toFixed(3)+'</div></div></div>';
  }).join('');
}

sel.addEventListener('change', function(){ render(sel.value); });
render(sel.value);
